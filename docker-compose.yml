services:
  car_img_get:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
    ports:
      - "53378:53378"
    environment:
      NODE_ENV: production
      PORT: "53378"
      DATASET_ROOT: /data/kuangyong/data/car_img_database/dataset_png
      EXPOSE_ERROR: "1"
    volumes:
      - /data/kuangyong/data/car_img_database/dataset_png:/data/kuangyong/data/car_img_database/dataset_png:ro
    restart: unless-stopped
